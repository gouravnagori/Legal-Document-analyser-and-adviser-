server.port=8080

# Maximum file upload size configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Groq AI Configuration
# For deployment: set these as environment variables instead of hardcoding
openai.api.key=${GROQ_API_KEY}
openai.api.url=https://api.groq.com/openai/v1/chat/completions
openai.api.model=llama-3.3-70b-versatile
openai.api.vision.model=meta-llama/llama-4-scout-17b-16e-instruct

# MongoDB Configuration
# For local development: install MongoDB and use localhost
# For deployment: set MONGODB_URI as environment variable with your Atlas connection string
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/legaladvisor}
spring.data.mongodb.auto-index-creation=true
